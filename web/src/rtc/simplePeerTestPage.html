<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple-Peer vs Native WebRTC Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .test-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .test-panel {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
    }
    h2 {
      margin-top: 0;
    }
    .log-container {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #eee;
      padding: 10px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 12px;
      background-color: #f9f9f9;
    }
    .log-entry {
      margin-bottom: 4px;
      border-bottom: 1px solid #eee;
      padding-bottom: 4px;
    }
    .log-simple-peer {
      color: #0066cc;
    }
    .log-native {
      color: #cc6600;
    }
    button {
      padding: 8px 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    button:hover {
      background-color: #45a049;
    }
    .controls {
      margin-bottom: 15px;
    }
    .feature-flag {
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    .feature-flag code {
      background-color: #e0e0e0;
      padding: 2px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Simple-Peer vs Native WebRTC Test</h1>
  
  <div class="feature-flag">
    <p>Current feature flag setting: <code id="feature-flag-status">Loading...</code></p>
    <p>To change the feature flag, edit <code>p2pManagerFactory.ts</code> and set <code>USE_SIMPLE_PEER</code> to <code>true</code> or <code>false</code>.</p>
  </div>
  
  <div class="controls">
    <button id="run-simple-peer-test">Run Simple-Peer Test</button>
    <button id="run-native-test">Run Native WebRTC Test</button>
    <button id="clear-logs">Clear Logs</button>
  </div>
  
  <div class="test-container">
    <div class="test-panel">
      <h2>Simple-Peer Implementation</h2>
      <div id="simple-peer-log" class="log-container"></div>
    </div>
    
    <div class="test-panel">
      <h2>Native WebRTC Implementation</h2>
      <div id="native-log" class="log-container"></div>
    </div>
  </div>
  
  <div>
    <h2>Connection Stats</h2>
    <div id="stats-container">
      <p>Run a test to see connection statistics.</p>
    </div>
  </div>
  
  <script type="module">
    import { runP2PTest } from './simplePeerTest.ts';
    import { USE_SIMPLE_PEER } from './p2pManagerFactory.ts';
    
    // Update feature flag status
    document.getElementById('feature-flag-status').textContent = USE_SIMPLE_PEER ? 'ENABLED' : 'DISABLED';
    
    // Override console.log to capture logs
    const originalConsoleLog = console.log;
    console.log = function(...args) {
      originalConsoleLog.apply(console, args);
      
      const message = args.join(' ');
      const logEntry = document.createElement('div');
      logEntry.className = 'log-entry';
      
      if (message.includes('[SimplePeer')) {
        logEntry.classList.add('log-simple-peer');
        document.getElementById('simple-peer-log').appendChild(logEntry);
      } else if (message.includes('[Native')) {
        logEntry.classList.add('log-native');
        document.getElementById('native-log').appendChild(logEntry);
      } else {
        // Add to both logs
        const logEntry2 = logEntry.cloneNode();
        document.getElementById('simple-peer-log').appendChild(logEntry);
        document.getElementById('native-log').appendChild(logEntry2);
      }
      
      logEntry.textContent = message;
      
      // Auto-scroll to bottom
      const logContainer = logEntry.parentElement;
      logContainer.scrollTop = logContainer.scrollHeight;
    };
    
    // Button event handlers
    let currentTest = null;
    
    document.getElementById('run-simple-peer-test').addEventListener('click', () => {
      if (currentTest) {
        currentTest.cleanup();
      }
      console.log('=== Starting Simple-Peer Test ===');
      currentTest = runP2PTest();
    });
    
    document.getElementById('run-native-test').addEventListener('click', () => {
      if (currentTest) {
        currentTest.cleanup();
      }
      console.log('=== Starting Native WebRTC Test ===');
      // This will use the implementation based on the feature flag
      currentTest = runP2PTest();
    });
    
    document.getElementById('clear-logs').addEventListener('click', () => {
      document.getElementById('simple-peer-log').innerHTML = '';
      document.getElementById('native-log').innerHTML = '';
      document.getElementById('stats-container').innerHTML = '<p>Run a test to see connection statistics.</p>';
    });
  </script>
</body>
</html>
