name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT: xreact-ae672
  GCP_REGION: us-central1
  SERVER_SERVICE: famchat-server
  WS_URL: wss://famchat-server-983257337319.us-central1.run.app

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy server to Cloud Run
        run: |
          gcloud run deploy $SERVER_SERVICE \
            --project $GCP_PROJECT \
            --region $GCP_REGION \
            --source . \
            --allow-unauthenticated \
            --session-affinity \
            --min-instances 0 \
            --max-instances 1 \
            --memory 256Mi \
            --timeout 3600 \
            --quiet

      - name: Verify server health
        run: |
          curl -fsS https://$SERVER_SERVICE-983257337319.$GCP_REGION.run.app/health

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-server
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -r run type:check

      - name: Build web
        run: pnpm --filter web build
        env:
          VITE_WS_URL: ${{ env.WS_URL }}

      - name: Write version.json
        run: |
          cat > web/dist/version.json <<EOF
          {
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "built_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: ${{ env.GCP_PROJECT }}

      - name: Verify live deploy SHA
        shell: bash
        run: |
          set -euo pipefail
          VERSION_URL="https://$GCP_PROJECT.web.app/version.json"
          EXPECTED_SHA="${GITHUB_SHA}"

          echo "Verifying live deploy at: $VERSION_URL"
          echo "Expected SHA: $EXPECTED_SHA"

          ok=false
          for i in {1..20}; do
            LIVE_SHA="$(curl -fsS "$VERSION_URL" 2>/dev/null | jq -r .sha 2>/dev/null || true)"
            if [ "$LIVE_SHA" = "$EXPECTED_SHA" ]; then
              echo "Live SHA matches: $LIVE_SHA"
              ok=true
              break
            fi
            echo "Attempt $i: live SHA is '$LIVE_SHA' (not yet '$EXPECTED_SHA'). Retrying..."
            sleep 6
          done

          if [ "$ok" != "true" ]; then
            echo "ERROR: Live SHA never matched expected SHA after 2 minutes."
            exit 1
          fi
